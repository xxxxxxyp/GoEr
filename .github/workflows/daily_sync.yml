name: GoEr Daily Pipeline

on:
  # 1. 定时触发：每天北京时间早上 8 点执行 (UTC 时间 0 点)
  schedule:
    - cron: '0 0 * * *'
  # 2. 手动触发：允许我们在网页上直接点按钮运行，方便测试
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Ubuntu 容器
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 匹配你目前使用的 Python 版本
          cache: 'pip'           # 开启缓存，加速以后的依赖安装

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Serverless Pipeline
        env:
          # 从刚才配置的 Secrets 中安全注入环境变量
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: |
          python scripts/run_daily_pipeline.py